services:
  postgres:
    image: postgres:16-alpine
    container_name: ${DB_CONTAINER}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./claris-backend
      dockerfile: Dockerfile
    container_name: claris-backend
    restart: unless-stopped
    ports:
      - "${PORT_NEST}:${PORT_NEST}"
      - "${PORT_PRISMA}:${PORT_PRISMA}"
    volumes:
      - ./claris-backend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/dist
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./claris-frontend
      dockerfile: Dockerfile
    container_name: claris-frontend
    restart: unless-stopped
    ports:
      - "${NEXT_PUBLIC_PORT}:${NEXT_PUBLIC_PORT}"
    volumes:
      - ./claris-frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

volumes:
  postgres_data:
    name: claris-postgres-data